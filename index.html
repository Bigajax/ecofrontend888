    <!-- Facebook Pixel -->
    <script>

      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];

      'https://connect.facebook.net/en_US/fbevents.js');

    <!-- Fim Facebook Pixel -->

    <!-- Google Identity Services (One Tap) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Helpers: --vh para 100vh e feature flag de backdrop-filter -->
    <script>
      (function () {
        function setVh() {
          var vh = (window.visualViewport ? window.visualViewport.height : window.innerHeight) * 0.01;
          document.documentElement.style.setProperty('--vh', vh + 'px');
        }
        setVh();
        window.addEventListener('resize', setVh, { passive: true });
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', setVh, { passive: true });
        }
        var supportsBackdrop =
          (window.CSS && CSS.supports && CSS.supports('backdrop-filter', 'blur(1px)')) ||
          (window.CSS && CSS.supports && CSS.supports('-webkit-backdrop-filter', 'blur(1px)'));
        if (supportsBackdrop) document.documentElement.classList.add('supports-backdrop');
      })();
    </script>

    <!-- Pequeno reset para cores de fundo e altura mínima -->
    <style>
      html, body, #root { height: 100%; }
      body {
        margin: 0;
        /* Soft Minimal: areia clara com orbs pastéis suaves */
        background:
          radial-gradient(680px 560px at 16% -12%, rgba(198, 169, 149, 0.04), transparent 58%),
          radial-gradient(540px 420px at 88% -6%, rgba(230, 235, 239, 0.035), transparent 62%),
          radial-gradient(720px 620px at 50% 120%, rgba(243, 238, 231, 0.03), transparent 70%),
          linear-gradient(180deg, #FAF9F7 0%, #F3EEE7 100%);
        color: #38322A; /* Terra úmida */
      }
      /* fallback p/ browsers sem svh: 100*var(--vh) */
      .min-h-viewport {
        min-height: calc(var(--vh, 1vh) * 100);
      }
    </style>
  </head>

  <body class="min-h-viewport">
    <!-- Facebook Pixel noscript (deve ficar no body) -->
    <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=1452404496069451&ev=PageView&noscript=1"
    /></noscript>
    <div id="root">
      <!-- 🛡️ FALLBACK DE SEGURANÇA: Mostrado se React não montar em 10s -->
      <!-- Crítico para Safari Mobile que pode falhar ao carregar após inatividade -->
      <div id="loading-fallback" style="
        display: flex;
        min-height: 100vh;
        width: 100%;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #FAF9F7 0%, #F3EEE7 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
        padding: 20px;
        box-sizing: border-box;
      ">
        <div style="text-align: center; max-width: 400px;">
          <!-- Spinner -->
          <div style="
            margin: 0 auto 24px;
            width: 48px;
            height: 48px;
            border: 4px solid #E2E8F0;
            border-top-color: #3B82F6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
          "></div>

          <!-- Mensagem -->
          <p style="
            font-size: 16px;
            font-weight: 500;
            color: #475569;
            margin: 0 0 12px;
          ">Carregando Ecotopia...</p>

          <p id="fallback-message" style="
            font-size: 14px;
            color: #94A3B8;
            margin: 0;
          ">Aguarde um momento</p>
        </div>
      </div>
    </div>

    <!-- Animação do spinner -->
    <style>
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* 🛡️ Ocultar fallback quando React montar */
      #loading-fallback {
        pointer-events: none; /* CRÍTICO: Nunca bloquear cliques */
      }

      /* Ocultar fallback quando app montar (flag setada pelo React) */
      body.app-mounted #loading-fallback {
        display: none !important;
      }
    </style>

    <!-- Script de timeout de segurança -->
    <script>
      (function() {
        // 🛡️ PROTEÇÃO: Se após 10s React não montou, mostrar erro amigável
        var startTime = Date.now();
        var fallbackShown = false;

        // 🛡️ Observador para detectar quando React monta
        var observer = new MutationObserver(function() {
          // Verificar se React montou (flag global ou conteúdo no root)
          if (window.__APP_MOUNTED__ || document.getElementById('root')?.children.length > 1) {
            // React montou! Remover fallback e parar observação
            var fallback = document.getElementById('loading-fallback');
            if (fallback) {
              fallback.style.display = 'none';
            }
            document.body.classList.add('app-mounted');
            observer.disconnect();

            console.info('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
            console.info('[index.html] ✅ React montou com sucesso!');
            console.info('[index.html] Fallback removido');
            console.info('[index.html] Tempo de carregamento:', Math.round((Date.now() - startTime) / 1000) + 's');
            console.info('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
          }
        });

        // Observar mudanças no root
        var root = document.getElementById('root');
        if (root) {
          observer.observe(root, { childList: true, subtree: true });
        }

        setTimeout(function() {
          // 🛡️ Se React já montou, não fazer nada
          if (window.__APP_MOUNTED__ || document.body.classList.contains('app-mounted')) {
            console.info('[index.html] ✅ Timeout de 10s alcançado mas React já montou - tudo OK!');
            return;
          }

          var root = document.getElementById('root');
          var fallback = document.getElementById('loading-fallback');

          // Se root ainda vazio ou só com fallback, significa que React não montou
          if (root && (root.children.length <= 1 || !root.textContent.trim().replace(/\s+/g, ''))) {
            fallbackShown = true;

            console.error('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
            console.error('[index.html] ⚠️ FALLBACK DE SEGURANÇA ATIVADO');
            console.error('[index.html] React não montou após 10s');
            console.error('[index.html] Mostrando tela de erro amigável');
            console.error('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');

            if (fallback) {
              // Habilitar pointer-events APENAS para fallback de erro (com botões)
              fallback.style.pointerEvents = 'auto';
              fallback.innerHTML = `
                <div style="text-align: center; max-width: 420px; padding: 32px; background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);">
                  <!-- Ícone de Erro -->
                  <div style="
                    width: 64px;
                    height: 64px;
                    margin: 0 auto 20px;
                    background: #FEE2E2;
                    border-radius: 50%;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-size: 32px;
                  ">⚠️</div>

                  <h1 style="
                    font-size: 20px;
                    font-weight: 600;
                    color: #1E293B;
                    margin: 0 0 12px;
                  ">Ops! Algo deu errado</h1>

                  <p style="
                    font-size: 14px;
                    color: #64748B;
                    line-height: 1.6;
                    margin: 0 0 24px;
                  ">
                    O aplicativo não conseguiu carregar corretamente.
                    ${/safari/i.test(navigator.userAgent) && !/chrome/i.test(navigator.userAgent)
                      ? 'Isso pode acontecer no Safari após inatividade.'
                      : 'Tente recarregar a página.'
                    }
                  </p>

                  <!-- Botões -->
                  <div style="display: flex; flex-direction: column; gap: 12px;">
                    <button onclick="window.location.reload()" style="
                      width: 100%;
                      padding: 14px 24px;
                      background: #3B82F6;
                      color: white;
                      border: none;
                      border-radius: 12px;
                      font-size: 15px;
                      font-weight: 600;
                      cursor: pointer;
                      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
                    ">🔄 Recarregar Página</button>

                    <button onclick="localStorage.clear(); sessionStorage.clear(); window.location.href = '/login';" style="
                      width: 100%;
                      padding: 14px 24px;
                      background: white;
                      color: #64748B;
                      border: 2px solid #E2E8F0;
                      border-radius: 12px;
                      font-size: 15px;
                      font-weight: 600;
                      cursor: pointer;
                    ">🏠 Limpar e Ir para Login</button>
                  </div>

                  <p style="
                    font-size: 12px;
                    color: #94A3B8;
                    margin: 16px 0 0;
                  ">Tempo de espera: ${Math.round((Date.now() - startTime) / 1000)}s</p>
                </div>
              `;
            }
          }
        }, 10000); // 10 segundos

        // Listener de erros globais
        window.addEventListener('error', function(e) {
          console.error('[index.html] 🚨 Erro global capturado:', e.message, e.filename, e.lineno, e.colno);
        });

        window.addEventListener('unhandledrejection', function(e) {
          console.error('[index.html] 🚨 Promise rejection não tratada:', e.reason);
        });
      })();
    </script>

    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
